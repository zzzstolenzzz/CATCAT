name: Retrain and publish model

on:
  schedule:
    - cron: '0 3 * * 0'  # every Sunday at 3am UTC
  workflow_dispatch:      # or trigger manually from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install ultralytics huggingface_hub pyyaml

      - name: Download annotations from HF Dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DATASET_REPO: ${{ secrets.DATASET_REPO }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id=os.environ["DATASET_REPO"],
              repo_type="dataset",
              local_dir="data",
              token=os.environ["HF_TOKEN"],
              ignore_patterns=["*.yaml", "*.json"],
          )
          EOF

      - name: Retrain YOLOv8
        run: |
          echo "=== Step: Retrain YOLOv8 ==="
          echo "dataset.yaml before script:"
          cat data/dataset.yaml || echo "(not found)"
          python scripts/retrain.py

      - name: Export, write metrics, and upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODEL_REPO: ${{ secrets.MODEL_REPO }}
          DATASET_REPO: ${{ secrets.DATASET_REPO }}
        run: python scripts/retrain_publish.py
