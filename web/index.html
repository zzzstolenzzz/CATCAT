<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CATCAT — Computer-Assisted Target Classification and Annotation Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="modern">
  <div id="app">
    <header>
      <h1>CATCAT <span style="font-size:0.65em;font-weight:400;color:#555;letter-spacing:0.05em">Computer-Assisted Target Classification and Annotation Tool</span></h1>
      <label class="theme-toggle" title="Switch theme">
        Stealth
        <input type="checkbox" id="theme-toggle" checked>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        Modern
      </label>
      <a href="dashboard.html" style="font-size:0.78rem;color:#555;text-decoration:none;margin-left:6px;padding:4px 10px;border:1px solid #2a2a2a;border-radius:4px;" onmouseover="this.style.color='#888'" onmouseout="this.style.color='#555'">Dashboard →</a>
      <div id="metrics">
        <span id="session-count">Session: 0</span>
        <span id="map-display">mAP50: —</span>
        <span id="model-status">Loading model…</span>
      </div>
    </header>

    <!-- SVG sharpen filter -->
    <svg width="0" height="0" style="position:absolute">
      <filter id="sharpen-filter">
        <feConvolveMatrix id="sharpen-kernel" order="3"
          kernelMatrix="0 0 0 0 1 0 0 0 0" preserveAlpha="true"/>
      </filter>
    </svg>

    <div id="toolbar">
      <input type="file" id="file-input" accept="image/*" multiple hidden>
      <button id="load-btn">Load Images</button>
      <button id="accept-btn" disabled tabindex="-1">Accept [Enter]</button>
      <button id="clear-btn" disabled>Clear</button>
      <button id="back-btn" disabled>Back</button>
      <button id="skip-btn" disabled>Skip</button>
      <div id="enhance-controls">
        <label>Bright<input type="range" id="brightness" min="50" max="200" value="100"></label>
        <label>Contrast<input type="range" id="contrast" min="50" max="300" value="100"></label>
        <label>Sharpen<input type="range" id="sharpen" min="0" max="100" value="0"></label>
        <button id="reset-enhance">Reset</button>
      </div>
    </div>

    <div id="canvas-container">
      <canvas id="image-canvas"></canvas>
      <canvas id="main-canvas"></canvas>
      <div id="canvas-hint">Click "Load Images" to begin</div>
    </div>

    <div id="status-bar">
      <span id="status-text">Initializing…</span>
      <span id="image-counter" style="margin-left:auto;color:#888"></span>
      <span style="color:#888">v5</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
  <script src="config.js?v=7"></script>
  <script src="app.js?v=7"></script>
</body>
</html>
